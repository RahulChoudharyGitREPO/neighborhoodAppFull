name: Deploy to Production

on:
  workflow_dispatch:  # Manual trigger
  push:
    tags:
      - 'v*'  # Trigger on version tags (e.g., v1.0.0)

jobs:
  deploy:
    name: Deploy to Production Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/neighborhood-helper-api:latest
            ${{ secrets.DOCKER_USERNAME }}/neighborhood-helper-api:${{ github.ref_name }}

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            # Navigate to app directory
            cd ${{ secrets.DEPLOY_PATH || '/opt/neighborhood-helper' }}

            # Pull latest code
            git pull origin main

            # Pull latest Docker image
            docker compose pull api

            # Stop old containers
            docker compose down

            # Start new containers
            docker compose --profile prod up -d

            # Clean up old images
            docker image prune -f

            # Show running containers
            docker compose ps

            # Show logs
            docker compose logs --tail=50 api

      - name: Health check
        run: |
          sleep 10
          curl --fail ${{ secrets.DEPLOY_URL }}/health || exit 1

      - name: Notify deployment
        if: success()
        run: echo "Deployment successful! 🚀"
