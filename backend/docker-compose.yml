version: '3.8'

services:
  # MongoDB Service
  mongodb:
    image: mongo:7
    container_name: neighborhood-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: neighborhood_helper
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - neighborhood-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API Service - Development
  api-dev:
    build:
      context: .
      target: development
    container_name: neighborhood-api-dev
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      API_URL: http://localhost:5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/neighborhood_helper?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-in-production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      WS_CORS_ORIGIN: http://localhost:3000
      BCRYPT_SALT_ROUNDS: 12
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - neighborhood-network
    profiles:
      - dev

  # Backend API Service - Production
  api:
    build:
      context: .
      target: production
    container_name: neighborhood-api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      API_URL: ${API_URL:-http://localhost:5000}
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/neighborhood_helper?authSource=admin
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      WS_CORS_ORIGIN: ${WS_CORS_ORIGIN:-http://localhost:3000}
      BCRYPT_SALT_ROUNDS: 12
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - neighborhood-network
    profiles:
      - prod

  # Optional: Mongo Express (Database UI)
  mongo-express:
    image: mongo-express:latest
    container_name: neighborhood-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      - mongodb
    networks:
      - neighborhood-network
    profiles:
      - dev

networks:
  neighborhood-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
