# GitLab CI/CD Pipeline for Neighborhood Helper API

stages:
  - test
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# Run tests
test:
  stage: test
  image: node:18-alpine
  services:
    - name: mongo:7
      alias: mongodb
      variables:
        MONGO_INITDB_ROOT_USERNAME: admin
        MONGO_INITDB_ROOT_PASSWORD: admin123
  variables:
    NODE_ENV: test
    MONGODB_URI: mongodb://admin:admin123@mongodb:27017/neighborhood_helper_test?authSource=admin
    JWT_ACCESS_SECRET: test-access-secret
    JWT_REFRESH_SECRET: test-refresh-secret
  before_script:
    - npm ci
  script:
    - npm run lint --if-present
    - npm test --if-present
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura-coverage.xml
    paths:
      - coverage/
    expire_in: 1 week
  only:
    - merge_requests
    - main
    - develop

# Build Docker image
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build --target production -t $IMAGE_NAME -t $IMAGE_LATEST .
    - docker push $IMAGE_NAME
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop
    - tags

# Deploy to staging
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$STAGING_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $STAGING_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $STAGING_USER@$STAGING_HOST << 'EOF'
        cd /opt/neighborhood-helper
        docker compose pull
        docker compose --profile prod down
        docker compose --profile prod up -d
        docker compose ps
      EOF
  environment:
    name: staging
    url: https://staging-api.yourdomain.com
  only:
    - develop

# Deploy to production
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$PRODUCTION_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $PRODUCTION_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $PRODUCTION_USER@$PRODUCTION_HOST << 'EOF'
        cd /opt/neighborhood-helper
        docker compose pull
        docker compose --profile prod down
        docker compose --profile prod up -d
        docker compose ps
        docker compose logs --tail=50 api
      EOF
    - sleep 10
    - curl --fail https://api.yourdomain.com/health
  environment:
    name: production
    url: https://api.yourdomain.com
  when: manual  # Require manual approval for production
  only:
    - main
    - tags
